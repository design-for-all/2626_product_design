<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 프로덕트 디자인 챌린지 — 일정 조율</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

  :root{
    /* === Figma 디자인 토큰 (node 2259:78726) === */
    --bg:#eef1f6;
    --panel:#ffffff;
    --ink:#121212;        /* 타이틀 텍스트 */
    --ink-2:#333333;      /* 본문 */
    --ink-3:#505050;      /* 입력 텍스트 */
    --ink-4:#646464;      /* 카드 본문 */
    --week-label:#777777; /* 이번주/다음주 */
    --muted:#abaebf;      /* 보조/카운트/편집 */
    --line:#eef0f4;
    --line-2:#d9deef;     /* 보더 */
    --blue:#4396fc;       /* 프라이머리 */
    --blue-range:rgba(67,150,252,0.2);
    --blue-soft:#f3f9ff;  /* 활성 행 배경 */
    --red:#ff7c7c;        /* 일요일/미정/필참 */
    --chip:#f4f6fa;
    --shadow:0 0 20px rgba(0,0,0,.1);
    --radius:20px;
    /* heatmap ramp: 가용도 클수록 진함 */
    --h0:#ffffff;
    --h1:#eaf2ff;
    --h2:#d3e3ff;
    --h3:#a9c9ff;
    --h4:#7aacff;
    --h5:#4396fc;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    background:var(--bg);color:var(--ink-2);
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.4;
    padding:0;overflow:hidden; /* 페이지 스크롤 제거 — 패널 내부 스크롤로 대체 */
  }
  /* 히트맵 행 높이: 뷰포트 높이에 따라 신축 (반응형) */
  :root{--rowh:clamp(32px, calc((100vh - 500px)/11), 52px);}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  .app{width:100%;height:100vh;display:flex;flex-direction:column;}

  /* ===== Header (Figma: 1920x80) ===== */
  header{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:#fff;}
  header h1{font-size:24px;font-weight:700;letter-spacing:-.02em;color:var(--ink);}
  .h-left{display:flex;align-items:center;gap:16px;}
  .figma-link{display:inline-flex;align-items:center;gap:5px;background:var(--blue-range);color:var(--blue);font-size:13.5px;font-weight:600;padding:7px 14px;border-radius:9px;text-decoration:none;transition:.12s;line-height:1.4;}
  .figma-link:hover{background:rgba(67,150,252,.3);}
  .figma-link .fl-arr{font-size:13px;transform:translateY(-1px);}
  .h-right{display:flex;align-items:center;gap:12px;}
  .avatar{width:32px;height:32px;border-radius:50%;background:#cdd6e6;position:relative;flex:0 0 auto;}
  .avatar::after{content:"";position:absolute;right:-1px;bottom:-1px;width:9px;height:9px;border-radius:50%;background:#2fcf6f;border:2px solid #fff;}
  .h-name{font-weight:600;font-size:16px;color:var(--ink);}
  .h-btn{border:1px solid var(--line-2);background:#fff;border-radius:8px;height:36px;padding:0 16px;font-size:14px;font-weight:500;color:var(--ink-3);}
  .h-btn:hover{background:#f7f9fc;}

  /* ===== Grid layout (Figma: 270/407/853/270, gap 20) ===== */
  .layout{flex:1;display:flex;align-items:stretch;min-height:0;}
  .content{flex:1;padding:14px 24px 18px;display:flex;flex-direction:column;gap:14px;min-width:0;min-height:0;}
  .cols{display:grid;grid-template-columns:minmax(340px,392px) minmax(0,1fr) minmax(268px,300px);gap:16px;align-items:stretch;flex:1;min-height:0;}
  .cols>*{min-height:0;}
  .col-mid{display:flex;flex-direction:column;gap:14px;min-height:0;overflow-y:auto;scrollbar-width:thin;}
  .col-mid .cal{flex:0 0 auto;}
  .col-mid .psched{flex:1;min-height:280px;}
  /* 반응형 브레이크포인트 */
  @media(max-width:1600px){.cols{grid-template-columns:minmax(320px,360px) minmax(0,1fr) 268px;}}
  @media(max-width:1240px){
    body{overflow:auto;}
    .app{height:auto;}
    .cols{display:flex;flex-direction:column;}
    .col-mid{overflow:visible;}
  }
  .card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);}

  /* ===== Left sidebar (Figma: pl22 pr14) ===== */
  .side{width:270px;flex:0 0 270px;background:#fff;padding:12px 0;display:flex;flex-direction:column;box-shadow:6px 0 18px rgba(20,30,50,.04);z-index:1;overflow-y:auto;scrollbar-width:thin;}
  .side-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 12px 22px;}
  .side-title{font-weight:600;font-size:18px;color:var(--ink);line-height:1.4;}
  .side-title small{color:var(--muted);font-weight:500;font-size:16px;margin-left:6px;}
  .btn-blue{background:var(--blue);color:#fff;border-radius:8px;height:36px;padding:0 20px;font-weight:500;font-size:16px;line-height:1.4;display:inline-flex;align-items:center;justify-content:center;}
  .btn-blue:hover{background:#2f86f5;}
  .sub-label{color:var(--week-label);font-size:14px;font-weight:500;line-height:1.4;padding:6px 14px 6px 22px;display:flex;align-items:center;justify-content:space-between;}
  .edit-link{color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;padding:2px 4px;border-radius:6px;}
  .edit-link:hover{color:var(--blue);}
  .edit-link.on{color:var(--red);}
  .sched-del{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:15px;cursor:pointer;flex:0 0 auto;}
  .sched-del:hover{background:#fdeeec;color:var(--red);}
  .sched-item{padding:10px 14px 10px 22px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.12s;}
  .sched-item:hover{background:#f7f9fc;}
  .sched-item.active{background:var(--blue-soft);}
  .sched-item .t{font-weight:600;font-size:16px;color:var(--ink);line-height:1.4;}
  .sched-item .d{color:var(--muted);font-size:14px;font-weight:500;margin-top:2px;line-height:1.4;}
  .sched-item .cnt{color:var(--muted);font-size:16px;font-weight:500;}
  .sched-item .chev{color:var(--muted);font-size:15px;margin-left:4px;width:32px;text-align:center;}
  .undef{color:var(--red);font-weight:500;font-size:14px;}
  .divider{height:1px;background:var(--line);margin:10px 0;}

  .att{display:flex;align-items:center;gap:10px;padding:10px 14px 10px 22px;cursor:pointer;transition:.12s;}
  .att:hover{background:#f7f9fc;}
  .att.active{background:var(--blue-soft);}
  .att .nm{font-weight:600;font-size:16px;color:var(--ink);display:flex;align-items:center;gap:6px;line-height:1.4;}
  .role-tag{font-size:14px;font-weight:500;color:var(--blue);} /* 주최자 = 블루 (Figma 1:143) */
  .req-badge{font-size:14px;font-weight:500;line-height:1.4;} /* 텍스트형 (Figma 12:102) */
  .req-y{color:var(--red);}
  .req-n{color:var(--muted);}
  .att .chev{margin-left:auto;color:var(--muted);width:32px;text-align:center;}

  /* ===== Calendar (Figma node 2259:78728: p20 r20 gap24, cell 49x48 r12) ===== */
  .cal{padding:18px 20px;display:flex;flex-direction:column;gap:16px;}
  .cal-top{display:flex;align-items:center;justify-content:space-between;}
  .cal-year{font-size:22px;font-weight:600;color:var(--ink-2);line-height:1.4;}
  .cal-nav{display:flex;align-items:center;gap:20px;}
  .cal-nav button{width:24px;height:24px;border-radius:7px;color:var(--muted);font-size:16px;}
  .cal-nav button:hover{background:#f4f6fa;}
  .cal-month{font-size:20px;font-weight:700;color:var(--ink-2);min-width:40px;text-align:center;line-height:1.4;}
  .cal-body{display:flex;flex-direction:column;gap:12px;}
  .cal-grid-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;height:30px;}
  .dow{font-size:14px;font-weight:500;color:var(--ink);letter-spacing:0.42px;display:flex;align-items:center;justify-content:center;line-height:1.2;}
  .dow.sun{color:var(--red);} .dow.sat{color:var(--blue);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px 4px;}
  .day{height:clamp(36px, calc((100vh - 780px)/5 + 36px), 48px);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;line-height:1.2;border-radius:12px;cursor:pointer;position:relative;transition:.1s;color:var(--ink-2);}
  .day:hover{background:#f4f6fa;}
  .day.mute{color:var(--muted);}
  .day.sun{color:var(--red);} .day.sat{color:var(--blue);}
  .day{z-index:0;}
  .day.range::before{content:"";position:absolute;top:0;bottom:0;left:0;right:0;background:var(--blue-range);z-index:-1;}
  .day.range:not(.rend)::before{right:-4px;} /* 셀 사이 4px gap까지 연속 채움 */
  .day.range.rstart::before{border-radius:12px 0 0 12px;}
  .day.range.rend::before{border-radius:0 12px 12px 0;}
  .day.range.rstart.rend::before{border-radius:12px;}
  .day.sel{background:var(--blue);color:#fff!important;border-radius:12px;}

  /* ===== Personal schedule (Figma node 2262:78555: p20 r20 gap24) ===== */
  .psched{padding:18px 20px;display:flex;flex-direction:column;gap:18px;min-height:0;}
  .ps-list{overflow-y:auto;min-height:0;scrollbar-width:thin;}
  .ps-head{display:flex;align-items:center;justify-content:space-between;}
  .ps-who{display:flex;align-items:center;gap:8px;font-weight:600;font-size:16px;color:var(--ink);line-height:1.4;}
  .ps-who-name{display:flex;align-items:center;gap:12px;}
  .ps-avatar{width:32px;height:32px;border-radius:50%;background:#cdd6e6;position:relative;flex:0 0 auto;}
  .ps-avatar::after{content:"";position:absolute;right:-1px;bottom:-1px;width:8px;height:8px;border-radius:50%;background:#2fcf6f;border:2px solid #fff;}
  /* 필참/선택 태그 (Figma: Medium 14, red, 18px chevron) */
  /* 사이드바 뱃지와 동일한 블록 스타일 + 중앙정렬 */
  .req-tag{display:inline-flex;align-items:center;gap:3px;font-size:14px;font-weight:500;line-height:1.4;cursor:pointer;position:relative;user-select:none;}
  .req-tag.req{color:var(--red);}
  .req-tag.opt-t{color:var(--muted);}
  .req-tag:hover{opacity:.8;}
  .req-tag .arrow{font-size:13px;}
  .req-menu{position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid var(--line-2);border-radius:10px;box-shadow:var(--shadow);padding:6px;width:120px;z-index:40;display:none;}
  .req-menu.open{display:block;}
  .req-menu .rm-item{padding:8px 10px;border-radius:8px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;color:var(--ink-2);}
  .req-menu .rm-item:hover{background:#f4f6fa;}
  .req-menu .rm-item .dot{width:7px;height:7px;border-radius:50%;}
  .req-menu .rm-item.r .dot{background:var(--red);}
  .req-menu .rm-item.o .dot{background:var(--muted);}

  input[type=text],input[type=time]{border:1.4px solid var(--line-2);border-radius:8px;height:44px;padding:10px 12px 10px 10px;font-family:inherit;font-size:16px;letter-spacing:-0.16px;line-height:1.2;color:var(--ink-3);width:100%;outline:none;transition:.12s;background:#fff;}
  input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(67,150,252,.12);}
  input::placeholder{color:var(--muted);}
  .ps-input-group{display:flex;flex-direction:column;gap:10px;}
  .ps-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .ps-row .times{display:flex;align-items:center;gap:10px;flex:1;}
  .ps-row .times{flex:0 1 auto;}
  .ps-row .time{width:118px;padding:8px 10px;font-size:15px;text-align:center;}
  /* 시간 드롭다운 셀렉트 */
  .tsel{position:relative;width:118px;height:44px;border:1.4px solid var(--line-2);border-radius:8px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;background:#fff;user-select:none;transition:.12s;}
  .tsel:hover{border-color:#c3cbdc;}
  .tsel.open{border-color:var(--blue);box-shadow:0 0 0 3px rgba(67,150,252,.12);}
  .tsel-val{font-size:15px;color:var(--ink-3);letter-spacing:-0.15px;}
  .tsel-arr{font-size:11px;color:var(--muted);}
  .tsel-menu{display:none;position:absolute;top:calc(100% + 6px);left:0;width:100%;max-height:186px;overflow-y:auto;background:#fff;border:1px solid var(--line-2);border-radius:10px;box-shadow:0 8px 24px rgba(20,30,50,.14);z-index:80;padding:4px;scrollbar-width:thin;}
  .tsel.open .tsel-menu{display:block;}
  .tsel-item{padding:8px 0;text-align:center;border-radius:7px;font-size:14px;color:var(--ink-2);}
  .tsel-item:hover{background:#f4f6fa;}
  .tsel-item.on{background:var(--blue-range);color:var(--blue);font-weight:600;}
  .ps-row .tilde{color:var(--ink-2);font-size:15px;letter-spacing:-0.15px;font-weight:400;}
  .btn-add{background:var(--blue);color:#fff;border-radius:8px;height:44px;padding:10px 20px;font-weight:500;font-size:16px;line-height:1.4;white-space:nowrap;}
  .btn-add:hover{background:#2f86f5;}
  .ps-list{display:flex;flex-direction:column;gap:10px;}
  .ps-card{border:1px solid var(--line-2);border-radius:12px;padding:16px 22px 16px 10px;display:flex;align-items:center;justify-content:space-between;}
  .ps-card .lft{display:flex;align-items:center;gap:12px;}
  .ps-card .grip{color:var(--muted);font-size:15px;width:32px;text-align:center;}
  .ps-card .info{display:flex;flex-direction:column;gap:4px;}
  .ps-card .info .ct{font-weight:500;font-size:14px;color:var(--ink-4);letter-spacing:-0.14px;line-height:1.2;}
  .ps-card .info .cd{color:var(--ink-4);font-size:14px;font-weight:500;letter-spacing:-0.14px;line-height:1.2;display:flex;gap:10px;}
  .ps-card .del{color:var(--muted);font-size:15px;padding:4px;border-radius:7px;width:32px;text-align:center;}
  .ps-card .del:hover{background:#fdeeec;color:var(--red);}
  .ps-empty{text-align:center;color:var(--muted);font-size:14px;padding:26px 10px;border:1px dashed var(--line-2);border-radius:12px;}
  .sel-date-badge{display:inline-block;background:var(--blue-range);color:var(--blue);font-size:12px;font-weight:600;padding:5px 11px;border-radius:8px;align-self:flex-start;}

  /* ===== Heatmap ===== */
  .heat{padding:16px 20px;display:flex;flex-direction:column;gap:14px;min-height:0;overflow:hidden;}
  .heat-top{display:flex;align-items:center;justify-content:space-between;}
  .heat-title{font-size:20px;font-weight:600;color:var(--ink);line-height:1.4;display:flex;align-items:baseline;gap:8px;}
  .heat-sub{font-size:17px;font-weight:500;color:var(--muted);}
  .heat-tools{display:flex;align-items:center;gap:8px;}
  .seg{display:flex;background:#f4f6fa;border-radius:10px;padding:3px;height:36px;}
  .seg button{padding:0 14px;border-radius:8px;font-size:14px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(20,30,50,.1);}
  .gear{width:36px;height:36px;border-radius:10px;border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px;position:relative;}
  .gear:hover{background:#f7f9fc;}
  .gear-menu{position:absolute;top:42px;right:0;background:#fff;border:1px solid var(--line-2);border-radius:12px;box-shadow:var(--shadow);padding:8px;width:220px;z-index:30;display:none;}
  .gear-menu.open{display:block;}
  .gm-item{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:9px;font-size:14px;font-weight:500;color:var(--ink-2);}
  .gm-item:hover{background:#f7f9fc;}
  .toggle{width:38px;height:22px;border-radius:20px;background:#d5dbe6;position:relative;transition:.15s;flex:0 0 auto;}
  .toggle.on{background:var(--blue);}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s;}
  .toggle.on::after{left:18px;}

  .heat-wrap{overflow:hidden;min-height:0;flex:1;display:flex;}
  #heatArea{flex:1;min-height:0;display:flex;flex-direction:column;}
  .htable{border-collapse:separate;border-spacing:0;width:100%;height:100%;table-layout:fixed;} /* 높이 100% → 남는 공간을 행들이 균등 분배 */
  .htable th,.htable td{text-align:center;}
  .h-corner{width:56px;}
  .h-icon{color:var(--muted);font-size:15px;}
  .h-dow{font-size:15px;font-weight:600;color:var(--ink);letter-spacing:0.42px;padding:0;height:34px;line-height:1.2;}
  .h-dow.sun{color:var(--red);} .h-dow.sat{color:var(--blue);}
  .h-datecell{padding:0 4px;height:44px;}
  .date-pill{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:32px;border-radius:9px;font-size:15px;font-weight:500;line-height:1.2;color:var(--ink-2);}
  .date-pill.sun{color:var(--red);} .date-pill.sat{color:var(--blue);}
  .date-pill.lit{background:var(--blue-range);}
  .date-pill.best{background:var(--blue);color:#fff;}
  .h-time{font-size:13px;font-weight:500;color:var(--ink-3);padding:0 8px 0 2px;text-align:left;white-space:nowrap;line-height:1.2;}
  .cell{border-right:1px solid #e3e7ef;border-bottom:1px solid #e3e7ef;position:relative;cursor:pointer;transition:.1s;}
  .htable tbody tr{height:calc((100% - 78px)/11);} /* 남는 높이 11행 균등 — 헤더(34+44) 제외 */
  .htable tbody tr:first-child .cell{border-top:1px solid #e3e7ef;}
  .h-time + .cell{border-left:1px solid #e3e7ef;} /* 좌측 외곽선 — 모든 선 1px 균일 */
  .cell.excl{background:repeating-linear-gradient(45deg,#f4f6fa,#f4f6fa 6px,#eef0f4 6px,#eef0f4 12px);cursor:not-allowed;}
  .cell:hover:not(.excl){outline:2px solid var(--blue);outline-offset:-2px;z-index:2;}
  .cell .tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#121212;color:#fff;font-size:12px;font-weight:500;padding:6px 9px;border-radius:8px;white-space:nowrap;z-index:20;box-shadow:0 6px 18px rgba(0,0,0,.2);}
  .cell:hover .tip{display:block;}
  .heat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;color:var(--muted);gap:12px;}
  .heat-empty .big{font-size:16px;font-weight:600;color:var(--ink-3);}
  .heat-empty .sm{font-size:14px;max-width:300px;line-height:1.5;}
  .heat-foot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:2px 2px 0;}
  .hf-toggles{display:flex;align-items:center;gap:18px;}
  .hf-item{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--ink-3);cursor:pointer;user-select:none;}
  .legend{display:flex;align-items:center;justify-content:center;gap:10px;font-size:13px;color:var(--ink-3);font-weight:500;}
  .legend .lbar{width:109px;height:14px;border-radius:7px;border:1px solid var(--line-2);background:linear-gradient(90deg,rgba(67,150,252,.85),rgba(67,150,252,.06));}

  /* ===== Right: coordination (Figma: pl22 pr14, gap 24) ===== */
  .coord{padding:16px 14px 16px 22px;display:flex;flex-direction:column;gap:24px;min-height:0;overflow-y:auto;scrollbar-width:thin;} /* 블록 간 24px (Figma 122→146) */
  .coord-title{font-size:18px;font-weight:600;color:var(--ink);line-height:1.4;}
  #coordBody{display:flex;flex-direction:column;gap:24px;min-height:0;} /* 블록 간 24px — Figma 122→146 실측 (v8 누락 교정) */
  .cx-block{display:flex;flex-direction:column;gap:10px;}
  .cx-head{display:flex;align-items:center;justify-content:space-between;}

  .opt .ot{font-weight:600;font-size:15px;color:var(--ink);line-height:1.4;}
  .opt .oc{color:var(--muted);font-size:14px;font-weight:500;margin-left:6px;}
  .opt.disabled{opacity:.55;}

  .opt-add .plus{margin-left:auto;width:22px;height:22px;border-radius:50%;background:var(--blue-range);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;cursor:pointer;flex:0 0 auto;}

  /* 셀 선택 테두리 + 투표 팝업 */
  .cell.pending{outline:2px solid #000;outline-offset:-2px;z-index:6;} /* 선택 테두리 검은색 */
  /* Figma 8:55: 좌하단만 직각(말풍선), 그림자 0 0 5px 12%, 구분선 #f3f9ff */
  .cell-pop{position:absolute;background:#fff;border-radius:12px 12px 12px 0;box-shadow:0 0 5px rgba(0,0,0,.12);padding:12px;min-width:112px;z-index:60;text-align:left;display:flex;flex-direction:column;gap:8px;}

  /* ===== 캘린더 뷰 (Figma 1:2147) ===== */
  .cv{flex:1;display:flex;flex-direction:column;min-height:0;gap:14px;}

  /* ===== 튜토리얼: 딤 + 코치마크 + 바텀시트 ===== */
  .tut-dim{position:fixed;inset:0;background:rgba(18,18,18,.45);z-index:1000;opacity:0;pointer-events:none;transition:.25s;}
  .tut-dim.show{opacity:1;pointer-events:auto;}
  .tut-elev{position:relative !important;z-index:1001 !important;}
  .tut-pop{position:fixed;z-index:1002;background:#fff;border-radius:14px;box-shadow:0 12px 36px rgba(0,0,0,.22);padding:16px 18px;max-width:300px;font-size:14px;line-height:1.55;color:var(--ink-2);}

  .tut-sheet{position:fixed;left:50%;bottom:24px;transform:translate(-50%,140%);z-index:1200;background:#fff;border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,.28);padding:18px 22px;display:flex;align-items:center;gap:18px;transition:transform .35s cubic-bezier(.2,.9,.3,1.1);}

  .tut-sheet .ts-text{font-size:15px;font-weight:600;color:var(--ink);line-height:1.5;}
  .tut-sheet .ts-text small{display:block;font-size:12.5px;font-weight:500;color:var(--muted);margin-top:2px;}
  .tut-sheet .ts-btns{display:flex;gap:8px;}
  .tut-sheet .ts-yes{background:var(--blue);color:#fff;border-radius:9px;height:38px;padding:0 18px;font-weight:600;font-size:14px;}
  .tut-sheet .ts-yes:hover{background:#2f86f5;}
  .tut-sheet .ts-no{background:#eef1f6;color:var(--ink-3);border-radius:9px;height:38px;padding:0 14px;font-weight:600;font-size:14px;}
  .tut-done{position:fixed;inset:0;z-index:1300;display:flex;align-items:center;justify-content:center;background:rgba(18,18,18,.45);}
  .tut-done .td-card{background:#fff;border-radius:20px;padding:34px 44px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .tut-done .td-emoji{font-size:40px;}
  .tut-done .td-title{font-size:20px;font-weight:700;color:var(--ink);margin:10px 0 6px;}
  .tut-done .td-sub{font-size:14px;color:var(--ink-3);line-height:1.6;}
  .tut-done button{margin-top:18px;background:var(--blue);color:#fff;border-radius:10px;height:42px;padding:0 26px;font-weight:600;font-size:15px;}

  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#121212;color:#fff;padding:13px 22px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;transition:.25s;z-index:100;display:flex;align-items:center;gap:9px;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* onboarding banner */
  .flow-banner{flex:0 0 auto;background:var(--blue);border-radius:12px;padding:11px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;font-size:15px;color:#fff;font-weight:500;line-height:1.4;}
  .flow-banner b{color:#fff;font-weight:700;}
  .banner-actions{display:flex;align-items:center;gap:12px;flex:0 0 auto;}

  .svg-i{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:middle;}
</style>

<script>
/* =========================================================
   SVG 라인 아이콘 (이모지 → 플랫폼 무관 렌더링)
   ========================================================= */
const ICONS = {
  clock:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#abaebf" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',

};

   상태 (State)

const WEEK = [
  {dow:'일', date:5, month:7, weekend:true},
  {dow:'월', date:6, month:7},
  {dow:'화', date:7, month:7},

// 기본 참석자 템플릿 (기존 회의들 공용)
const DEFAULT_ATT = [
  {name:'홍길동', role:'주최자', required:true},
  {name:'홍길서', role:'참석자', required:true},
  {name:'홍길남', role:'참석자', required:true},

  {name:'홍길하', role:'참석자', required:true},
];
const cloneAtt = a => a.map(x=>({...x}));
// 활성 회의의 참석자 (회의 전환 시 교체됨)
let attendees = []; // 회의 생성 전 비어있음

// 회의(전체 일정) 목록 — 초기 3건
// 튜토리얼: 회의 0건에서 시작 — 유저가 직접 생성

// 당일(오늘) 기준 주간 계산 — 데이터 없을 때 빈 히트맵의 축
function currentWeek(){
  const t=new Date(); const sun=new Date(t); sun.setDate(t.getDate()-t.getDay());
  return [...Array(7)].map((_,i)=>{const d=new Date(sun); d.setDate(sun.getDate()+i);
    return {dow:DAYS[i],date:d.getDate(),month:d.getMonth()+1,weekend:i===0||i===6};});
}
// 아래 전역들은 "활성 회의"의 상태 뷰 — switchMeeting에서 저장/복원
let selectedSlot = null;
let selectedPlace = null;
let votes = {};
let myVoted = new Set();
let removedSlots = new Set(); // 편집으로 삭제된 시간 후보
let timeEdit = false, placeEdit = false; // 섹션별 편집 모드
let placeAdding = false; // 장소 추가 입력 모드

// ===== 회의 전환: 현재 상태 저장 → 대상 회의 상태 복원 =====
function saveMeetingState(i){
  const m=meetings[i]; if(!m) return;
  m.att=attendees; m.sel=selectedSlot; m.place=selectedPlace;
  m.votes=votes; m.voted=myVoted; m.conf=confirmed; m.removed=removedSlots;
}
function switchMeeting(i){
  saveMeetingState(activeMeeting);
  activeMeeting=i;
  const m=meetings[i];
  if(!m.att) m.att=attendees; // 초기 동기화
  attendees=m.att; selectedSlot=m.sel; selectedPlace=m.place;
  votes=m.votes; myVoted=m.voted; confirmed=m.conf;
  removedSlots=m.removed||new Set(); timeEdit=false; placeEdit=false; placeAdding=false;
  // 활성 참석자가 이 회의 명단에 없으면 첫 번째로
  if(!attendees.some(a=>a.name===activeAttendee)) activeAttendee=attendees[0].name;
  $('#psWho').textContent=activeAttendee;
  $('#heatTitle').textContent=m.title; // 히트맵 타이틀 = 선택 회의 제목
  renderMeetings(); renderAttendees(); syncReqTag();
  renderPersonalList(); buildHeatmap(); renderCoord();
}

let pickPhase = 'start';   // 'start'|'end' — 다음 클릭이 시작인지 종료인지

const $ = s => document.querySelector(s);
function toast(msg){
  const t = $('#toast'); t.innerHTML = '✓ '+msg; t.classList.add('show');
  clearTimeout(window._tt); window._tt = setTimeout(()=>t.classList.remove('show'),2200);
}
function pad(h){return String(h).padStart(2,'0')+':00';}
function setHint(t){const el=document.querySelector('#rangeHint'); if(el) el.textContent=t;}

function renderMeetings(){
  $('#schCount').textContent = meetings.length+'건';
  if(meetings.length===0){
    $('#meetingList').innerHTML='<div class="ps-empty" style="margin:6px 14px 6px 22px;">아직 회의가 없어요<br><b>추가</b>로 시작해보세요</div>';
    return;
  }
  let html='';
  let lastWeek='';
  meetings.forEach((m,i)=>{
    if(m.week && m.week!==lastWeek){
      html+=`<div class="sub-label"><span>${m.week}</span><span class="edit-link ${meetEditMode?'on':''}" data-editweek="1">${meetEditMode?'완료':'편집'}</span></div>`;
      lastWeek=m.week;
    }
    const isActive = i===activeMeeting;
    const meta = m.status==='undef'
      ? `<div class="d"><span class="undef">미정</span></div>`
      : `<div class="d">${m.dateLabel}</div>`;
    // 편집모드: 'n명 >' 자리를 삭제버튼으로 교체
    const right = meetEditMode
      ? `<button class="sched-del" data-delmeet="${i}" title="일정 삭제">${ICONS.trash}</button>`
      : `<div style="display:flex;align-items:center;"><span class="cnt">${m.count}명</span><span class="chev">›</span></div>`;
    html+=`<div class="sched-item ${isActive?'active':''}" data-mi="${i}">
      <div><div class="t">${m.title}</div>${meta}</div>
      ${right}
    </div>`;
  });
  $('#meetingList').innerHTML = html;
  document.querySelectorAll('[data-mi]').forEach(el=>el.onclick=(e)=>{
    if(e.target.closest('[data-delmeet]')) return; // 삭제버튼 클릭은 제외
    if(meetEditMode) return; // 편집모드에선 선택 비활성
    switchMeeting(+el.dataset.mi);
  });
  document.querySelectorAll('[data-editweek]').forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    meetEditMode=!meetEditMode; renderMeetings();
  });
  document.querySelectorAll('[data-delmeet]').forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    const i=+el.dataset.delmeet;
    const removed=meetings[i].title;
    meetings.splice(i,1);
    let next=activeMeeting;
    if(i===activeMeeting) next=Math.max(0,Math.min(activeMeeting,meetings.length-1));
    else if(i<activeMeeting) next=activeMeeting-1;
    activeMeeting=-1; // save 스킵용 (삭제된 인덱스에 저장 방지)
    switchMeeting(next);
    toast(`'${removed}' 일정을 삭제했어요`);
  });
}

function syncReqTag(){
  const a = attendees.find(x=>x.name===activeAttendee);
  if(!a) return;
  const tag=$('#reqTag'), txt=$('#reqTagText');
  txt.textContent = a.required?'필참':'선택';
  tag.classList.toggle('req', a.required);
  tag.classList.toggle('opt-t', !a.required);

   렌더: 캘린더 (월간)
   ========================================================= */
function renderCalendar(){
  const grid = $('#calGrid');
  // 2026년 7월: 1일=수요일. 앞쪽 6/28(일)~30(화) 채움
  const cells = [
    {d:28,mute:true,dow:0},{d:29,mute:true,dow:1},{d:30,mute:true,dow:2},
    {d:1,dow:3},{d:2,dow:4},{d:3,dow:5},{d:4,dow:6},
    {d:5,dow:0},{d:6,dow:1},{d:7,dow:2},{d:8,dow:3},{d:9,dow:4},{d:10,dow:5},{d:11,dow:6},
    {d:12,dow:0},{d:13,dow:1},{d:14,dow:2},{d:15,dow:3},{d:16,dow:4},{d:17,dow:5},{d:18,dow:6},
    {d:19,dow:0},{d:20,dow:1},{d:21,dow:2},{d:22,dow:3},{d:23,dow:4},{d:24,dow:5},{d:25,dow:6},
    {d:26,dow:0},{d:27,dow:1},{d:28,dow:2},{d:29,dow:3},{d:30,dow:4},{d:31,dow:5},{d:1,mute:true,dow:6},
  ];
  let html='';
  $('#calDow').innerHTML = ['일','월','화','수','목','금','토'].map((d,i)=>
    `<div class="dow ${i===0?'sun':''} ${i===6?'sat':''}">${d}</div>`).join('');
  cells.forEach(c=>{
    let cls='day';
    if(c.mute) cls+=' mute';
    if(c.dow===0&&!c.mute) cls+=' sun';
    if(c.dow===6&&!c.mute) cls+=' sat';
    // 범위 하이라이트 (7월 & mute 아님)
    if(!c.mute && rangeStart!==null && c.d>=rangeStart && c.d<=rangeEnd){
      cls+=' range';
      if(c.d===rangeStart) cls+=' rstart';
      if(c.d===rangeEnd) cls+=' rend';
    }
    if(!c.mute && rangeStart!==null && (c.d===rangeStart||c.d===rangeEnd)) cls+=' sel';
    html+=`<div class="${cls}" data-day="${c.mute?'':c.d}">${c.d}</div>`;
  });
  grid.innerHTML=html;

  // 범위 선택 인터랙션 (전역 pickPhase로 클릭 상태 유지 → 재렌더에도 초기화 안 됨)
  document.querySelectorAll('#calGrid .day:not(.mute)').forEach(el=>{
    el.onclick=()=>{
      const d=+el.dataset.day; if(!d) return;
      if(pickPhase==='start'){
        // 첫 클릭: 시작일 지정
        rangeStart=d; rangeEnd=d; pickPhase='end';
        setHint(`시작: 7월 ${d}일 — 종료일을 누르세요`);
      } else {
        // 두 번째 클릭: 종료일 지정 → 범위 확정
        rangeStart=Math.min(rangeAnchor??d, d);
        rangeEnd=Math.max(rangeAnchor??d, d);
        pickPhase='start';
        setHint(`선택: 7월 ${rangeStart}일 ~ ${rangeEnd}일`);
      }
      if(pickPhase==='end') rangeAnchor=d; // 시작 앵커 저장
      renderCalendar();
    };
  });
  // (선택 날짜 배지는 Figma 반영 과정에서 제거됨 — 토스트로 안내)
}

/* =========================================================
   히트맵 계산: 가용도 = 안 겹친 사람 수
   진할수록 = 비어있음(가용 많음)
   ========================================================= */
function computeAvailability(dateIdx, hour){
  // 이 슬롯([hour, hour+1))에 일정이 없는 사람 수
  let free = 0;
  attendees.forEach(a=>{
    const scheds = personal[a.name]||[];
    const busy = scheds.some(s => s.dateIdx===dateIdx && hour < s.end && (hour+1) > s.start);
    if(!busy) free++;
  });
  return free; // 0~6
}
// [반전] 진한 색 = 일정이 많이 겹침(바쁨), 옅은 색 = 여유
// Figma 팔레트: rgba(67,150,252, α), α = busy/total (1:1123 실측 0.2~0.8 스케일)
function rampColor(free, total){
  const busy = total - free;
  if(busy<=0) return 'transparent';
  const a = Math.min(0.85, +(busy/total).toFixed(2));
  return `rgba(67,150,252,${a})`;
}

function syncToggleUI(){
  const el1=$('#tgW2'), el2=$('#tgL2');
  if(el1) el1.classList.toggle('on', options.weekend);
  if(el2) el2.classList.toggle('on', options.lunch);
}
function buildHeatmap(){
  viewMode='heat';
  const area = $('#heatArea');
  syncToggleUI();
  const empty = !hasData();
  const week = empty ? currentWeek() : WEEK;   // 데이터 없으면 당일 주간, 있으면 회의 주
  const total = attendees.length;

  const colScore = week.map((w,di)=>{
    if(empty) return 0;
    if(options.weekend && w.weekend) return -1;
    let s=0; HOURS.forEach(h=>{ if(!(options.lunch && h===12)) s+=computeAvailability(di,h); });
    return s;
  });
  const maxCol = Math.max(...colScore);

  let html = `<div class="heat-wrap"><table class="htable"><thead>`;
  html+=`<tr><th class="h-corner"><span class="h-icon">${ICONS.clock}</span></th>`;
  week.forEach(w=>{
    html+=`<th class="h-dow ${w.dow==='일'?'sun':''} ${w.dow==='토'?'sat':''}">${w.dow}</th>`;
  });
  html+=`</tr>`;
  html+=`<tr><th class="h-corner"><span class="h-icon">${ICONS.cal}</span></th>`;
  week.forEach((w,i)=>{
    let cls='date-pill';
    if(w.dow==='일')cls+=' sun'; if(w.dow==='토')cls+=' sat';
    let pillStyle='';
    if(!empty){
      const excluded = options.weekend && w.weekend;
      if(!excluded && colScore[i]>0 && colScore[i]===maxCol) cls+=' best'; // 최적일 마커
      else if(!excluded){
        // [반전] 날짜도 겹침 비율만큼 진하게
        const busyRatio = 1 - (colScore[i] / (HOURS.length*attendees.length));
        if(busyRatio>0.05) pillStyle=`background:rgba(67,150,252,${Math.min(0.55,busyRatio*0.6).toFixed(2)});`;
      }
    }
    html+=`<th class="h-datecell"><span class="${cls}" style="${pillStyle}">${w.date}</span></th>`;
  });
  html+=`</tr></thead><tbody>`;

  HOURS.forEach(h=>{
    html+=`<tr><td class="h-time">${pad(h)}</td>`;
    week.forEach((w,di)=>{
      if(empty){ // 빈 히트맵: 전부 흰색, 클릭/툴팁 없음
        html+=`<td class="cell" style="background:#fff;cursor:default;"></td>`; return;
      }
      const exclW = options.weekend && w.weekend;
      const exclL = options.lunch && h===12;
      if(exclW||exclL){ html+=`<td class="cell excl"></td>`; return; }
      const free = computeAvailability(di,h);
      const color = rampColor(free,total);
      const isSel = selectedSlot && selectedSlot.dateIdx===di && selectedSlot.hour===h;
      html+=`<td class="cell" style="background:${color};${isSel?'outline:2px solid #000;outline-offset:-2px;z-index:3;':''}" data-di="${di}" data-h="${h}">

function voteSlot(di,h){
  const k=di+'-'+h;
  if(myVoted.has(k)){ toast('이미 투표한 시간대예요'); return; }
  votes[k]=(votes[k]||0)+1;
  myVoted.add(k);
  renderCoord(); // 후보 목록·득표수 갱신
  const w=WEEK[di];
  toast(`${w.month}/${w.date}(${w.dow}) ${pad(h)} 투표 완료`);
  if(typeof TUT!=='undefined') tutAdvance('voted');
}

/* =========================================================
   렌더: 오른쪽 조율 패널
   ========================================================= */
function bestSlots(){
  const total=attendees.length;
  let cand=[];
  WEEK.forEach((w,di)=>{
    if(options.weekend && w.weekend) return;
    HOURS.forEach(h=>{
      if(options.lunch && h===12) return;
      if(h===18) return; // 마지막 경계 슬롯 후보 제외(실무: 종료시간 몰림 방지)
      const reqFree = attendees.filter(a=>a.required).every(a=>{
        const sc=personal[a.name]||[]; return !sc.some(s=>s.dateIdx===di && h<s.end && (h+1)>s.start);
      });
      if(removedSlots.has(di+'-'+h)) return; // 편집으로 삭제된 슬롯 제외
      const free=computeAvailability(di,h);
      cand.push({di,h,free,reqFree});
    });
  });
  // 필수전원 가능 & 가용 높은 순
  cand.sort((a,b)=> (b.reqFree-a.reqFree) || (b.free-a.free) || (a.di-b.di) || (a.h-b.h));
  // 날짜 다양성: 같은 날짜 최대 2개까지만
  const picked=[]; const perDay={};
  for(const c of cand){
    perDay[c.di]=perDay[c.di]||0;
    if(perDay[c.di]>=2) continue;
    picked.push(c); perDay[c.di]++;
    if(picked.length>=3) break;
  }
  return picked;
}

function renderCoord(){
  const body=$('#coordBody');
  const empty=!hasData() || activeMeeting<0 || attendees.length===0;
  const total=Math.max(attendees.length,0);
  let timeBody, placeBody, finalBody, subLine;

  if(empty){
    // 요구 6: 빈 상태 — 점선 안내, 박스 크기는 채워진 상태와 동일 유지
    subLine=`<span class="u"><span style="display:inline-flex;align-items:center;gap:4px">${ICONS.person} ${total}명 참여중</span></span> <span style="color:var(--blue);font-weight:600">0/${total}</span>`;
    timeBody=`<div class="cx-empty fill">일정을 등록하면\n가능한 시간대가 나타나요</div>`;
    placeBody=`<div class="cx-empty fill">시간대 확인 후\n장소를 선택할 수 있어요</div>`;
    finalBody=`<div class="cx-empty fill">조율이 끝나면\n최종 일정이 표시돼요</div>`;
  } else {
    // 후보 = 가용도 top3 ∪ 투표된 슬롯 (최대 5개, 시간순 표시)
    const cands=bestSlots();
    Object.keys(votes).forEach(k=>{
      if(removedSlots.has(k)) return;
      const [di,h]=k.split('-').map(Number);
      if(!cands.some(cd=>cd.di===di&&cd.h===h) && cands.length<5){
        cands.push({di,h,free:computeAvailability(di,h),reqFree:true});
      }
    });
    const voteOf={}; cands.forEach(cd=>voteOf[cd.di+'-'+cd.h]=votes[cd.di+'-'+cd.h]||0);
    const disp=[...cands].sort((a,b)=>(a.di-b.di)||(a.h-b.h)); // 표시 = 시간순

    const votedSum = Object.values(votes).reduce((a,b)=>a+b,0);
    subLine=`<span class="u"><span style="display:inline-flex;align-items:center;gap:4px">${ICONS.person} ${total}명 참여중</span></span> ${confirmed?'<span style="color:#1a9c4f;font-weight:600">확정</span>':`<span style="color:var(--blue);font-weight:600">${Math.min(votedSum,total)}/${total}</span>`}`;
    timeBody=disp.map(cd=>{
      const w=WEEK[cd.di];
      const on = selectedSlot && selectedSlot.dateIdx===cd.di && selectedSlot.hour===cd.h;
      const right = timeEdit
        ? `<button class="opt-del" data-delslot="${cd.di}-${cd.h}" title="삭제">${ICONS.trash}</button>`
        : `<span class="radio"></span>`;
      return `<div class="opt ${on?'on':''} ${timeEdit?'editing':''}" data-di="${cd.di}" data-h="${cd.h}">
        <div><span class="ot">${w.month}월 ${w.date}일 ${pad(cd.h)}</span><span class="oc">${voteOf[cd.di+'-'+cd.h]}명</span></div>
        ${right}</div>`;
    }).join('');
    placeBody=places.map((pl,i)=>{
      const on = selectedPlace===i;
      const right = placeEdit
        ? `<button class="opt-del" data-delplace="${i}" title="삭제">${ICONS.trash}</button>`
        : `<span class="radio"></span>`;
      return `<div class="opt ${on?'on':''} ${placeEdit?'editing':''}" data-place="${i}">
        <div><span class="ot">${pl.name}</span><span class="oc">${pl.count}명</span></div>
        ${right}</div>`;
    }).join('')+(placeAdding
      ? `<div class="opt-add adding"><input type="text" id="placeInput" placeholder="장소를 입력해주세요" maxlength="20"><span class="plus" id="placeAddConfirm">+</span></div>`
      : `<div class="opt-add" id="addPlace">장소 추가<span class="plus">+</span></div>`);

    const finalReady = selectedSlot && selectedPlace!==null;
    if(finalReady){
      const w=WEEK[selectedSlot.dateIdx];
      finalBody=`<div class="final-card">
        <div class="ft">${w.month}월 ${w.date}일 ${pad(selectedSlot.hour)}</div>
        <div class="fmeta"><span>${places[selectedPlace].name}</span><span class="p"><span class="p" style="display:inline-flex;align-items:center;gap:4px">${ICONS.person} ${Math.min(votedSum,total)}명 참여</span></span></div>
      </div>`;
    } else {
      finalBody=`<div class="cx-empty fill">시간·장소를 선택하면\n최종 일정이 표시돼요</div>`;
    }
  }

  body.innerHTML=`
    <div class="cx-block">
      <div class="cx-head"><div class="cx-label">${meetings[activeMeeting]?meetings[activeMeeting].title:'회의 없음'}</div>
        <span class="status-chip ${confirmed?'live':''}">${confirmed?'확정됨':'진행중'}</span></div>
      <div class="cx-sub">${subLine}</div>
    </div>
    <div class="cx-block">
      <div class="cx-head"><div class="cx-label">시간 선택 ${empty?'':`<span class="edit-link2 ${timeEdit?'on':''}" id="timeEditBtn">${timeEdit?'완료':'편집'}</span>`}</div><button class="btn-mini" id="confirmTime">확인</button></div>
      <div class="cx-body tb">${timeBody}</div>
    </div>
    <div class="cx-block">
      <div class="cx-head"><div class="cx-label">장소 선택 ${empty?'':`<span class="edit-link2 ${placeEdit?'on':''}" id="placeEditBtn">${placeEdit?'완료':'편집'}</span>`}</div><button class="btn-mini" id="confirmPlace">확인</button></div>
      <div class="cx-body pb">${placeBody}</div>
    </div>
    <div class="cx-divider"></div>
    <div class="cx-block">
      <div class="cx-head"><div class="cx-label">과반수 일정</div><button class="btn-mini" id="shareBtn">공유</button></div>
      <div class="cx-body fb">${finalBody}</div>
      <div class="coord-note">ⓘ 공유 시 참여자에게 일정이 전달돼요</div>
    </div>`;

  if(empty) return; // 빈 상태에선 조작 불가

  const tEdit=$('#timeEditBtn'); if(tEdit) tEdit.onclick=(e)=>{e.stopPropagation(); timeEdit=!timeEdit; renderCoord();};
  const pEdit=$('#placeEditBtn'); if(pEdit) pEdit.onclick=(e)=>{e.stopPropagation(); placeEdit=!placeEdit; renderCoord();};
  document.querySelectorAll('[data-delslot]').forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    const k=el.dataset.delslot;
    removedSlots.add(k); delete votes[k]; myVoted.delete(k);
    const [di,h]=k.split('-').map(Number);
    if(selectedSlot && selectedSlot.dateIdx===di && selectedSlot.hour===h) selectedSlot=null;
    buildHeatmap(); renderCoord();
    toast('시간 후보를 삭제했어요');
  });
  document.querySelectorAll('[data-delplace]').forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    const i=+el.dataset.delplace;
    places.splice(i,1);
    if(selectedPlace===i) selectedPlace=null;
    else if(selectedPlace>i) selectedPlace--;
    renderCoord();
    toast('장소를 삭제했어요');
  });
  document.querySelectorAll('.opt[data-di]').forEach(el=>el.onclick=()=>{
    if(timeEdit) return; // 편집 중엔 선택 비활성
    selectedSlot={dateIdx:+el.dataset.di,hour:+el.dataset.h};
    buildHeatmap(); renderCoord();
  });
  document.querySelectorAll('.opt[data-place]').forEach(el=>el.onclick=()=>{
    if(placeEdit) return;
    selectedPlace=+el.dataset.place; renderCoord();
  });
  // '장소 추가' 클릭 → 인라인 입력 모드
  const addP=$('#addPlace'); if(addP) addP.onclick=()=>{
    placeAdding=true; renderCoord();
    const inp=$('#placeInput'); if(inp) inp.focus();
  };
  // 입력 모드: + 버튼 또는 Enter로 확정
  const confirmAdd=()=>{
    const inp=$('#placeInput');
    const n=(inp?inp.value:'').trim();
    if(!n){ toast('장소 이름을 입력해주세요'); if(inp) inp.focus(); return; }
    places.push({name:n, count:0});
    placeAdding=false;
    renderCoord();
    toast(`'${n}'이(가) 장소 후보에 추가됐어요`);
  };
  const addBtn=$('#placeAddConfirm'); if(addBtn) addBtn.onclick=(e)=>{e.stopPropagation(); confirmAdd();};
  const inp=$('#placeInput'); if(inp){
    inp.onclick=e=>e.stopPropagation();
    inp.onkeydown=e=>{
      if(e.key==='Enter') confirmAdd();
      if(e.key==='Escape'){ placeAdding=false; renderCoord(); }
    };
  }
  $('#confirmTime').onclick=()=>{ selectedSlot?toast('시간 후보 확인됨'):toast('시간을 먼저 선택하세요'); };
  $('#confirmPlace').onclick=()=>{ selectedPlace!==null?toast('장소 확인됨'):toast('장소를 먼저 선택하세요'); };
  $('#shareBtn').onclick=()=>{
    if(!(selectedSlot && selectedPlace!==null)){toast('시간과 장소를 모두 선택하세요');return;}
    confirmed=true;
    const w=WEEK[selectedSlot.dateIdx];
    meetings[activeMeeting].status='done';
    meetings[activeMeeting].conf=true;
    meetings[activeMeeting].count=attendees.length;
    meetings[activeMeeting].dateLabel=`${w.month}월 ${w.date}일 ${pad(selectedSlot.hour)}`;
    renderMeetings(); renderCoord();
    toast(`${w.month}/${w.date} ${pad(selectedSlot.hour)} · ${places[selectedPlace].name} 공유 완료`);
    if(typeof TUT!=='undefined') tutAdvance('shared');
  };
}

function initTimeSelects(){
  const conf=[{id:'psStart',min:8,max:18},{id:'psEnd',min:9,max:19}];
  conf.forEach(cf=>{
    const el=$('#'+cf.id), menu=el.querySelector('.tsel-menu');
    let html='';
    for(let h=cf.min;h<=cf.max;h++) html+=`<div class="tsel-item" data-h="${h}">${pad(h)}</div>`;
    menu.innerHTML=html;
    el.onclick=(e)=>{
      e.stopPropagation();
      const wasOpen=el.classList.contains('open');
      document.querySelectorAll('.tsel.open').forEach(t=>t.classList.remove('open'));
      if(!wasOpen){
        el.classList.add('open');
        menu.querySelectorAll('.tsel-item').forEach(it=>it.classList.toggle('on',+it.dataset.h===+el.dataset.h));
        const on=menu.querySelector('.tsel-item.on'); if(on) on.scrollIntoView({block:'nearest'});
      }
    };
    menu.querySelectorAll('.tsel-item').forEach(it=>{
      it.onclick=(e)=>{
        e.stopPropagation();
        el.dataset.h=it.dataset.h;
        el.querySelector('.tsel-val').textContent=pad(+it.dataset.h);
        el.classList.remove('open');
        // 시작 변경 시 종료가 이르면 자동 보정 (+1시간)
        if(cf.id==='psStart'){
          const s=+el.dataset.h, endEl=$('#psEnd');
          if(+endEl.dataset.h<=s){
            endEl.dataset.h=s+1;
            endEl.querySelector('.tsel-val').textContent=pad(s+1);
          }
        }
      };
    });
  });
  document.addEventListener('click',()=>document.querySelectorAll('.tsel.open').forEach(t=>t.classList.remove('open')));
}

// 캘린더 뷰: 월간 그리드, 날짜별 겹침 농도(진함=바쁨), 지난 날짜 회색 (Figma 1:2147)
function buildCalendarView(){
  viewMode='cal';
  const area=$('#heatArea');
  const foot=$('#heatFoot'); if(foot) foot.style.visibility='hidden'; // 자체 범례 사용
  const today=new Date(); // 지난 날짜 기준 = 오늘
  // "내 일정": 로그인 사용자(홍길서) 본인 일정의 하루 점유율 (의도: 자신의 일정만 따로 확인)
  const mySched = personal['홍길서']||[];
  const busyOf={};
  WEEK.forEach((w,di)=>{
    let busyHours=0;
    HOURS.forEach(h=>{ if(mySched.some(s=>s.dateIdx===di && h<s.end && (h+1)>s.start)) busyHours++; });
    busyOf[w.date]= busyHours/HOURS.length;
  });
  // 점 마커 = 오늘 (요구 1)
  const isTodayJuly = today.getFullYear()===2026 && today.getMonth()===6;
  const todayDate = isTodayJuly ? today.getDate() : null;

  const cells=[
    {d:28,mute:1},{d:29,mute:1},{d:30,mute:1},{d:1},{d:2},{d:3},{d:4},
    {d:5},{d:6},{d:7},{d:8},{d:9},{d:10},{d:11},
    {d:12},{d:13},{d:14},{d:15},{d:16},{d:17},{d:18},
    {d:19},{d:20},{d:21},{d:22},{d:23},{d:24},{d:25},
    {d:26},{d:27},{d:28},{d:29},{d:30},{d:31},{d:1,mute:1,next:1},
  ];
  let html=`<div class="cv">
    <div class="cv-head"><span class="cv-year">2026</span>
      <span class="cv-nav"><button id="cvPrev">‹</button><span class="cv-month">7월</span><button id="cvNext">›</button></span></div>
    <div class="cv-dow">${['일','월','화','수','목','금','토'].map((d,i)=>`<span class="${i===0?'sun':''} ${i===6?'sat':''}">${d}</span>`).join('')}</div>
    <div class="cv-grid">`;
  cells.forEach((cell,idx)=>{
    const dow=idx%7;
    const dt = cell.mute ? null : new Date(2026,6,cell.d);
    const isPast = dt && dt < new Date(today.getFullYear(),today.getMonth(),today.getDate());
    let tile='', txt='';
    if(cell.mute) txt='mute';
    else{
      if(dow===0) txt='sun'; if(dow===6) txt='sat';
      if(isPast) tile='background:#eef0f4;'; // 지난 날짜 회색 (요구 1)
      else if(busyOf[cell.d]!==undefined && busyOf[cell.d]>0.02)
        tile=`background:rgba(67,150,252,${Math.min(0.85,busyOf[cell.d]).toFixed(2)});`;
    }
    const darkBg = !cell.mute && !isPast && (busyOf[cell.d]||0) > 0.55;
    html+=`<div class="cv-cell"><div class="cv-tile ${isPast?'past':''}" style="${tile}">
      <span class="cv-num ${txt} ${darkBg?'onblue':''}">${cell.d}</span>
      ${todayDate===cell.d&&!cell.mute&&!cell.next?'<span class="cv-dot"></span>':''}
    </div></div>`;
  });
  html+=`</div>
    <div class="cv-legend">
      <span class="cvl"><span class="cvl-swatch"></span>지난 일정</span>
      <span class="cvl">바쁨<span class="cvl-bar"></span>여유</span>
    </div>
  </div>`;
  area.innerHTML=html;
  $('#cvPrev').onclick=()=>toast('데모: 7월만 제공돼요');
  $('#cvNext').onclick=()=>toast('데모: 7월만 제공돼요');
}

function bindFootToggles(){
  const map={tgW2:'weekend', tgL2:'lunch'};
  Object.keys(map).forEach(id=>{
    const el=$('#'+id); if(!el) return;
    el.classList.toggle('on', options[map[id]]);
    el.parentElement.onclick=()=>{
      const k=map[id]; options[k]=!options[k];
      el.classList.toggle('on', options[k]);
      buildHeatmap(); renderCoord();
      toast(options[k]?`${k==='weekend'?'주말':'점심시간'} 제외 켬`:`${k==='weekend'?'주말':'점심시간'} 제외 끔`);
    };
  });
}
bindFootToggles();

/* =========================================================
   튜토리얼 엔진 — 딤 + 코치마크(행동 트리거) + 자동입력 바텀시트
   ========================================================= */
const TUT = { on:false, cur:null, inviteAsked:false, schedAsked:false, done:false }; // 버튼 클릭 시 시작

const TUT_STEPS = {
  start:  {elev:'.side',  arrow:'left',  x:'right', text:'<div class="tp-step">1/5 회의 생성</div>👋 튜토리얼을 시작할게요!<br>먼저 <b>추가</b> 버튼을 눌러 회의를 만들어보세요.'},
  invite: {elev:'.side',  arrow:'left',  x:'right', text:'<div class="tp-step">2/5 동료 초대</div>회의가 생겼어요.<br>참석자 옆 <b>초대</b>를 눌러 동료를 불러보세요.'},
  sched:  {elev:'.col-mid',arrow:'left', x:'right', text:'<div class="tp-step">3/5 일정 입력</div>동료가 모였어요!<br>① 달력에서 <b>날짜</b>를 누르고<br>② 제목·시간을 넣어 <b>추가</b>를 눌러<br>본인 일정을 하나 입력해보세요.'},
  heat:   {elev:'.heat',  arrow:'right', x:'left',  text:'<div class="tp-step">4/5 일정 조율</div>히트맵이 완성됐어요. <b>옅은 칸</b>일수록<br>모두가 여유로운 시간이에요.<br>칸을 눌러 <b>일정 투표</b>에 올려보세요.'},
  coord:  {elev:'.coord', arrow:'right', x:'left',  text:'<div class="tp-step">5/5 확정·공유</div>마지막이에요! <b>시간</b>과 <b>장소</b>를 선택하고<br><b>공유</b>를 눌러 일정을 확정하세요.'},
};

function tutClear(){
  document.querySelectorAll('.tut-elev').forEach(el=>el.classList.remove('tut-elev'));
  const pop=$('#tutPop'); if(pop) pop.remove();
}
function tutShow(key){
  if(!TUT.on || TUT.done) return;
  TUT.cur=key; tutClear();
  const st=TUT_STEPS[key];
  const target=document.querySelector(st.elev);
  if(!target) return;
  $('#tutDim').classList.add('show');
  target.classList.add('tut-elev');
  const pop=document.createElement('div');
  pop.id='tutPop'; pop.className='tut-pop arrow-'+st.arrow;
  pop.innerHTML=st.text+'<span class="tp-skip" onclick="tutSkip()">튜토리얼 건너뛰기</span>';
  document.body.appendChild(pop);
  const r=target.getBoundingClientRect();
  if(st.x==='right'){ pop.style.left=(r.right+14)+'px'; }
  else{ pop.style.left=Math.max(12, r.left-pop.offsetWidth-14)+'px'; }
  pop.style.top=Math.max(12, r.top+16)+'px';
}
function tutSkip(){
  TUT.on=false; tutClear();
  $('#tutDim').classList.remove('show');
  hideSheet();
  toast('튜토리얼을 건너뛰었어요 — 자유롭게 사용해보세요');
}
function tutAdvance(evt){
  if(!TUT.on || TUT.done) return;
  if(evt==='meeting') tutShow('invite');
  else if(evt==='attFull') tutShow('sched');
  else if(evt==='schedReady') tutShow('heat');
  else if(evt==='voted') tutShow('coord');
  else if(evt==='shared') tutFinish();
}
function tutFinish(){
  TUT.done=true; tutClear();
  $('#tutDim').classList.remove('show');
  const d=document.createElement('div');
  d.className='tut-done'; d.id='tutDone';
  d.innerHTML=`<div class="td-card"><div class="td-emoji">🎉</div>
    <div class="td-title">튜토리얼 완료!</div>
    <div class="td-sub">회의 생성부터 일정 확정·공유까지<br>전체 플로우를 경험하셨어요.<br>이제 자유롭게 사용해보세요.</div>
    <button onclick="document.getElementById('tutDone').remove()">시작하기</button></div>`;
  document.body.appendChild(d);
}

// ===== 바텀시트: 자동입력 제안 =====
function showSheet(title, sub, onYes){
  hideSheet();
  const s=document.createElement('div');
  s.className='tut-sheet'; s.id='tutSheet';
  s.innerHTML=`<div class="ts-text">${title}<small>${sub}</small></div>
    <div class="ts-btns"><button class="ts-yes">자동 입력</button><button class="ts-no">직접 할게요</button></div>`;
  document.body.appendChild(s);
  requestAnimationFrame(()=>s.classList.add('show'));
  s.querySelector('.ts-yes').onclick=()=>{ hideSheet(); onYes(); };
  s.querySelector('.ts-no').onclick=()=>hideSheet();
}
function hideSheet(){ const s=$('#tutSheet'); if(s){ s.classList.remove('show'); setTimeout(()=>s.remove(),350);} }

// ===== 초대: 프리셋 큐에서 한 명씩 =====
const INVITE_QUEUE=[
  {name:'홍길동', role:'참석자', required:true},
  {name:'홍길남', role:'참석자', required:true},
  {name:'홍길북', role:'참석자', required:false},
  {name:'홍길상', role:'참석자', required:false},
  {name:'홍길하', role:'참석자', required:true},
];
$('#inviteBtn').onclick=()=>{
  if(activeMeeting<0){ toast('먼저 회의를 추가해주세요'); return; }
  const next=INVITE_QUEUE.find(q=>!attendees.some(a=>a.name===q.name));
  if(!next){ toast('모든 동료를 초대했어요'); return; }
  attendees.push({...next});
  renderAttendees(); buildHeatmap(); renderCoord();
  toast(`${next.name} 님을 초대했어요 (${next.required?'필참':'선택'})`);
  if(TUT.on && !TUT.inviteAsked){
    TUT.inviteAsked=true;
    showSheet('[튜토리얼] 남은 동료를 자동으로 초대할까요?','남은 4명과 필참/선택 설정이 한 번에 입력돼요',autofillAttendees);
  }
  if(attendees.length>=6) tutAdvance('attFull');
};
function autofillAttendees(){
  INVITE_QUEUE.forEach(q=>{ if(!attendees.some(a=>a.name===q.name)) attendees.push({...q}); });
  meetings[activeMeeting].count=attendees.length;
  renderMeetings(); renderAttendees(); buildHeatmap(); renderCoord();
  toast('참석자 6명 구성 완료 — 필참 4명 · 선택 2명');
  tutAdvance('attFull');
}

// ===== 일정 자동입력: 전원 시드 주입 + 자동 등록 =====
// 튜토리얼 시작 버튼: 현재 진행 상태에 맞는 단계부터 시작
$('#tutStartBtn').onclick=()=>{
  if(TUT.done || confirmed){ toast('이미 전체 플로우를 완료했어요 — 자유롭게 사용해보세요'); return; }
  TUT.on=true;
  let step='start';
  if(activeMeeting>=0){
    if(attendees.length<6) step='invite';
    else if(!hasData()) step='sched';
    else if(Object.keys(votes).length===0) step='heat';
    else step='coord';
  }
  tutShow(step);
};

function autofillSchedules(){
  Object.keys(SEED_SCHED).forEach(n=>{
    const have=personal[n]||[];
    SEED_SCHED[n].forEach(s=>{
      if(!have.some(x=>x.dateIdx===s.dateIdx&&x.start===s.start&&x.title===s.title)) have.push({...s});
    });
    personal[n]=have;
  });
  // draft 자동 등록
  Object.keys(draftList).forEach(nm=>{
    personal[nm]=[...(personal[nm]||[]), ...(draftList[nm]||[])]; draftList[nm]=[];
  });
  if(meetings[activeMeeting] && meetings[activeMeeting].title==='새 회의'){
    meetings[activeMeeting].title='화상 미팅';
    $('#heatTitle').textContent='화상 미팅';
  }
  renderMeetings(); renderPersonalList(); buildHeatmap(); renderCoord();
  toast('참석자 전원의 일정이 입력됐어요');
  tutAdvance('schedReady');
}
</script>
